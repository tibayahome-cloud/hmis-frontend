# docker-compose.yml — Tiba HMIS Frontend
#
# Frontend service only. The backend runs its own docker-compose in tyh-api/.
#
# Backend connectivity:
#   Set API_BASE to reach the backend from inside this container.
#
#   Backend running natively on this machine:
#     API_BASE=http://host.docker.internal:8000
#
#   Backend running via its own docker-compose on the same host:
#     API_BASE=http://host.docker.internal:8000
#     (Docker Desktop on Mac/Windows resolves host.docker.internal automatically)
#
# Profiles:
#   (no profile)  dev server with hot reload, source mounted as a volume
#   prod          production standalone build
#
# Usage:
#   docker compose up                        # dev server on :3000
#   docker compose --profile prod up --build # production image on :3000

services:

  # ── Development server ─────────────────────────────────────────────────────
  frontend-dev:
    profiles: ["dev", ""]
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app          # mount source for hot reload
      - /app/node_modules
      - /app/.next
    environment:
      - API_BASE=${API_BASE:-http://host.docker.internal:8000}
      - NODE_ENV=development
    restart: unless-stopped

  # ── Production build ───────────────────────────────────────────────────────
  frontend-prod:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        API_BASE: ${API_BASE:-http://host.docker.internal:8000}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_BASE=${API_BASE:-http://host.docker.internal:8000}
    restart: unless-stopped
